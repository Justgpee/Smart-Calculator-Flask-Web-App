<!DOCTYPE html>
<!--  arithmetic calculator main/homepage -->
<html>
<head>
    <title>Arithmetic Calculator</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- outer card container — styled by .card in style.css -->
    <div class="card">
        <h1>Arithmetic Calculator</h1>
        <p class="subtitle">Enter two numbers and pick an operation</p>

        <!-- form sends data to the same page using POST method -->
        <form method="POST">

            <!-- first & second number input — name must match request.form["num1"] and request.form["num2"] in app.py -->
            <label>First Number</label>
            <input type="number" step="any" name="num1" required>

            <label>Second Number</label>
            <input type="number" step="any" name="num2" required>

            <!-- dropdown to pick an operation, value= must match if/elif in app.py-->
            <label>Operation</label>
            <select name="operation">
                <option value="add">Addition</option>
                <option value="subtract">Subtraction</option>
                <option value="multiply">Multiplication</option>
                <option value="divide">Division</option>
            </select>

            <!-- submit button triggers the POST request -->
            <button type="submit">Calculate</button>
        </form>

        <!-- jinja condition - only show result box when Flask passed a result value -->
        {% if result is not none %}
            <div class="result-box">Result: {{ result }}</div>
        {% endif %}

        <!-- navigate links to other pages -->
        <div class="nav">
            <a href="/area">Area Calculator</a>
            <a href="/quadratic">Quadratic Solver</a>
        </div>
    </div>
</body>
</html>
